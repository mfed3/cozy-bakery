<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Cottage Bakery</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
            min-height: 100vh;
            color: #5d4e42;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const products = {
            bakedGoods: [
                { name: "Artisan Sourdough Bread", price: 8.99, description: "Traditional sourdough with a crispy crust", image: "🍞" },
                { name: "Croissants", price: 4.99, description: "Flaky layers of buttery pastry", image: "🥐" },
                { name: "Swiss Rolls", price: 3.99, description: "Swirled sponge cake with cream filling", image: "🍰" },
                { name: "Fresh Pastries", price: 3.49, description: "Assorted morning pastries including danish, cinnamon rolls, and more", image: "🍮" },
                { name: "Chocolate Chip Cookies", price: 2.49, description: "Homemade with real chocolate chips", image: "🍪" },
                { name: "Layer Cake", price: 24.99, description: "Three-layer celebration cake", image: "🎂" },
                { name: "Apple Pie", price: 8.99, description: "Classic homemade apple pie", image: "🥧" }
            ],
            chocolateItems: [
                { name: "Chocolate-Covered Almonds", price: 6.99, description: "Premium almonds with dark chocolate", image: "🌰" },
                { name: "Chocolate-Covered Raisins", price: 5.99, description: "Sweet raisins in rich chocolate", image: "🍇" },
                { name: "Dried Fruit Mix", price: 7.99, description: "Assorted dried fruits", image: "🍒" }
            ],
            fruitProducts: [
                { name: "Strawberry Jam", price: 5.99, description: "Fresh strawberry preserves", image: "🍓" },
                { name: "Blueberry Jelly", price: 5.99, description: "Sweet blueberry jelly", image: "🫐" },
                { name: "Mixed Berry Preserves", price: 6.49, description: "Seasonal berry mix", image: "🍇" }
            ],
            dryGoods: [
                { name: "Dried Cranberries", price: 4.99, description: "Sweet and tart dried cranberries", image: "🍒" },
                { name: "Dried Pasta", price: 3.99, description: "Homemade dried pasta", image: "🍝" },
                { name: "Baking Mix - Chocolate Chip", price: 6.99, description: "Complete mix for cookies", image: "🍪" },
                { name: "Baking Mix - Vanilla Cake", price: 6.99, description: "Complete mix for vanilla cake", image: "🎂" }
            ]
        };

        const App = () => {
            const [activeCategory, setActiveCategory] = useState('bakedGoods');
            const [cart, setCart] = useState([]);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const categories = [
                { id: 'bakedGoods', name: 'Baked Goods', icon: '🍞' },
                { id: 'chocolateItems', name: 'Chocolate Items', icon: '🍫' },
                { id: 'fruitProducts', name: 'Fruit Products', icon: '🍓' },
                { id: 'dryGoods', name: 'Dry Goods', icon: '📦' }
            ];

            const addToCart = (product) => {
                setCart([...cart, product]);
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
            };

            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0).toFixed(2);

            return (
                <div className="app">
                    <header className="header">
                        <div className="header-content">
                            <h1 className="logo">🏡 Cozy Cottage Bakery</h1>
                            <p className="tagline">Fresh from our home kitchen to your table</p>
                        </div>
                        <nav className={`nav ${isMenuOpen ? 'nav-open' : ''}`}>
                            <button className="menu-toggle" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i className={`fas ${isMenuOpen ? 'fa-times' : 'fa-bars'}`}></i>
                            </button>
                        </nav>
                    </header>

                    <main className="main-content">
                        <section className="categories">
                            {categories.map(cat => (
                                <button
                                    key={cat.id}
                                    className={`category-btn ${activeCategory === cat.id ? 'active' : ''}`}
                                    onClick={() => setActiveCategory(cat.id)}
                                >
                                    <span className="category-icon">{cat.icon}</span>
                                    <span className="category-name">{cat.name}</span>
                                </button>
                            ))}
                        </section>

                        <section className="products-section">
                            <h2 className="section-title">{categories.find(c => c.id === activeCategory).name}</h2>
                            <div className="products-grid">
                                {products[activeCategory].map((product, index) => (
                                    <div key={index} className="product-card">
                                        <div className="product-image">{product.image}</div>
                                        <h3 className="product-name">{product.name}</h3>
                                        <p className="product-desc">{product.description}</p>
                                        <div className="product-price">${product.price.toFixed(2)}</div>
                                        <button 
                                            className="add-btn"
                                            onClick={() => addToCart(product)}
                                        >
                                            <i className="fas fa-plus"></i> Add to Cart
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="cart-section">
                            <h2 className="cart-title">Your Cart</h2>
                            {cart.length === 0 ? (
                                <p className="empty-cart">Your cart is empty</p>
                            ) : (
                                <div className="cart-items">
                                    {cart.map((item, index) => (
                                        <div key={index} className="cart-item">
                                            <span className="cart-item-name">{item.name}</span>
                                            <span className="cart-item-price">${item.price.toFixed(2)}</span>
                                            <button 
                                                className="remove-btn"
                                                onClick={() => removeFromCart(index)}
                                            >
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <div className="cart-total">
                                <span>Total:</span>
                                <span>${cartTotal}</span>
                            </div>
                            <button className="checkout-btn" onClick={() => alert('Thank you for your order! Contact us to complete your purchase.')}>
                                Checkout
                            </button>
                        </section>
                    </main>

                    <footer className="footer">
                        <div className="footer-content">
                            <h3>🏡 Cozy Cottage Bakery</h3>
                            <p>Made with love in our home kitchen</p>
                            <div className="footer-links">
                                <a href="#">Contact Us</a>
                                <a href="#">About Us</a>
                                <a href="#">Privacy Policy</a>
                            </div>
                            <p className="copyright">© 2024 Cozy Cottage Bakery. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #8b5a2b 0%, #6b4423 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header-content {
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .tagline {
            font-style: italic;
            opacity: 0.9;
        }

        .nav {
            text-align: center;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .category-btn {
            background: white;
            border: 2px solid #8b5a2b;
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            text-align: center;
        }

        .category-btn:hover {
            background: #8b5a2b;
            color: white;
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: #8b5a2b;
            color: white;
        }

        .category-icon {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .category-name {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .products-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .section-title {
            text-align: center;
            color: #8b5a2b;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: linear-gradient(135deg, #fff8f0 0%, #fff 100%);
            border: 1px solid #e8d5c4;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .product-image {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 1.1rem;
            color: #5d4e42;
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #8b7360;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.2rem;
            color: #8b5a2b;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .add-btn {
            background: linear-gradient(135deg, #8b5a2b 0%, #6b4423 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .add-btn:hover {
            background: linear-gradient(135deg, #6b4423 0%, #4a3320 100%);
            transform: scale(1.02);
        }

        .cart-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .cart-title {
            color: #8b5a2b;
            margin-bottom: 15px;
            text-align: center;
        }

        .empty-cart {
            text-align: center;
            color: #8b7360;
            padding: 20px;
        }

        .cart-items {
            max-height: 300px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e8d5c4;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-name {
            flex: 1;
            color: #5d4e42;
        }

        .cart-item-price {
            color: #8b5a2b;
            font-weight: bold;
        }

        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f5e6d3;
            border-radius: 10px;
            margin-top: 15px;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            background: linear-gradient(135deg, #229954 0%, #1e8449 100%);
            transform: scale(1.02);
        }

        .footer {
            background: #5d4e42;
            color: white;
            padding: 30px 20px;
            margin-top: 20px;
            border-radius: 15px;
        }

        .footer-content {
            text-align: center;
        }

        .footer h3 {
            margin-bottom: 10px;
        }

        .footer-links {
            margin: 20px 0;
        }

        .footer-links a {
            color: #d4c5b0;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: white;
        }

        .copyright {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 1.5rem;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }

            .category-btn {
                min-width: 100px;
                padding: 12px 15px;
            }

            .category-name {
                font-size: 0.8rem;
            }

            .category-icon {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .app {
                padding: 10px;
            }

            .header {
                padding: 15px;
            }

            .logo {
                font-size: 1.2rem;
            }

            .tagline {
                font-size: 0.8rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .product-card {
                padding: 15px;
            }

            .product-image {
                font-size: 2.5rem;
            }

            .product-name {
                font-size: 1rem;
            }

            .product-desc {
                font-size: 0.8rem;
            }

            .add-btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</body>
</html>
