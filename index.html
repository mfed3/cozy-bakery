<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Loaf</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const products = {
            breads: [
                { name: "Artisan Sourdough", price: 9.99, description: "Traditional rustic sourdough", image: "🍞" },
                { name: "Signature Sourdough", price: 14.99, description: "Artistic decorative scoring designs", image: "🍞" },
                { name: "Ciabatta", price: 5.99, description: "Light and airy Italian bread", image: "🥖" },
                { name: "Focaccia", price: 9.49, description: "Classic fluffy Italian bread", image: "🥖" }
            ],
            pies: [
                { name: "Apple Pie", price: 18.99, description: "Classic homemade apple pie", image: "🥧" },
                { name: "Blueberry Pie", price: 19.99, description: "Homemade blueberry filling", image: "🥧" },
                { name: "Pecan Pie", price: 21.99, description: "Rich and sweet pecan pie", image: "🥧" },
                { name: "Pumpkin Pie", price: 17.99, description: "Spiced Autumn classic ", image: "🥧" }
            ],
            cookies: [
                { name: "Chocolate Chip Cookie", price: 1.49, description: "Classic with chocolate chips", image: "🍪" },
                { name: "Strawberry Tea Cookie", price: 1.49, description: "Homemade strawberry jam", image: "🍪" },
                { name: "Apricot Tea Cookie", price: 1.49, description: "Homemade apricot jam", image: "🍪" }
            ],
            pastries: [
                { name: "Croissant", price: 3.99, description: "Flaky and buttery", image: "🥐" },
                { name: "Cornetto", price: 3.99, description: "Soft and chewy Italian pastry", image: "🥐" },
                { name: "Blueberry Muffin", price: 3.49, description: "Fresh blueberries", image: "🧁" },
                { name: "Banana Bread Muffin", price: 3.49, description: "Banana chocolate and nuts", image: "🧁" }
            ]
        };

        const App = () => {
            const [activeCategory, setActiveCategory] = useState('breads');
            const [cart, setCart] = useState([]);

            const categories = [
                { id: 'breads', name: 'Breads', icon: '🍞' },
                { id: 'pies', name: 'Pies', icon: '🥧' },
                { id: 'cookies', name: 'Cookies', icon: '🍪' },
                { id: 'pastries', name: 'Pastries', icon: '🥐' }
            ];

            const addToCart = (product) => {
                setCart([...cart, product]);
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
            };

            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0).toFixed(2);

            return (
                <div className="app">
                    <header className="header">
                        <div className="header-content">
                            <h1 className="logo">🏡 Cozy Loaf</h1>
                            <p className="tagline">Fresh from our home kitchen to your table</p>
                        </div>
                    </header>

                    <main className="main-content">
                        <section className="categories">
                            {categories.map(cat => (
                                <button
                                    key={cat.id}
                                    className={`category-btn ${activeCategory === cat.id ? 'active' : ''}`}
                                    onClick={() => setActiveCategory(cat.id)}
                                >
                                    <span className="category-icon">{cat.icon}</span>
                                    <span className="category-name">{cat.name}</span>
                                </button>
                            ))}
                        </section>

                        <section className="products-section">
                            <h2 className="section-title">{categories.find(c => c.id === activeCategory).name}</h2>
                            <div className="products-grid">
                                {products[activeCategory].map((product, index) => (
                                    <div key={index} className="product-card">
                                        <div className="product-image">{product.image}</div>
                                        <h3 className="product-name">{product.name}</h3>
                                        <p className="product-desc">{product.description}</p>
                                        <div className="product-price">${product.price.toFixed(2)}</div>
                                        <button 
                                            className="add-btn"
                                            onClick={() => addToCart(product)}
                                        >
                                            <i className="fas fa-plus"></i> Add to Cart
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="cart-section">
                            <h2 className="cart-title">Your Cart</h2>
                            {cart.length === 0 ? (
                                <p className="empty-cart">Your cart is empty</p>
                            ) : (
                                <div className="cart-items">
                                    {cart.map((item, index) => (
                                        <div key={index} className="cart-item">
                                            <span className="cart-item-name">{item.name}</span>
                                            <span className="cart-item-price">${item.price.toFixed(2)}</span>
                                            <button 
                                                className="remove-btn"
                                                onClick={() => removeFromCart(index)}
                                            >
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <div className="cart-total">
                                <span>Total:</span>
                                <span>${cartTotal}</span>
                            </div>
                            <button className="checkout-btn" onClick={() => alert('Thank you for your order! Contact us to complete your purchase.')}>
                                Checkout
                            </button>
                        </section>
                    </main>

                    <footer className="footer">
                        <div className="footer-content">
                                <h3>🏡 Cozy Loaf</h3>
                            <p>Made with love in our home kitchen</p>
                            <div className="footer-links">
                                <a href="#">Contact Us</a>
                                <a href="#">About Us</a>
                                <a href="#">Privacy Policy</a>
                            </div>
                            <p className="copyright">© 2026 Cozy Loaf. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
